name: CI Pipeline

on:
  push:
    # branches:
    #   - main
    #   - develop

jobs:

  run-shell-commands:
    runs-on: ubuntu-latest

    steps:
      - name: Echo a String
        run: echo "Hello World"

      - name: Multiline Command
        run: |
          node -v
          npm -v

  parallel-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Print Current Directory
        run: |
          pwd
          ls -la

  dependent-jobs:
    runs-on: ubuntu-latest

    needs:
      - run-shell-commands
      - parallel-jobs

    steps:
      - name: Check Docker Version
        run: docker --version

  windows-job:
    runs-on: windows-latest

    steps:
      - name: Run on Windows
        run: |
          pwd
          dir

